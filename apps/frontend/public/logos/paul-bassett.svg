<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" width="100" height="100">
  <!-- White background circle -->
  <circle cx="50" cy="50" r="50" fill="#ffffff"/>
  <!-- Crown shape - Paul Bassett red crown brand mark -->
  <g transform="translate(50,50)">
    <!-- Crown base band -->
    <rect x="-22" y="10" width="44" height="8" rx="2" fill="#c8102e"/>
    <!-- Crown body -->
    <path d="M-22,12 L-22,-2 L-10,-12 L0,-4 L10,-12 L22,-2 L22,12 Z" fill="#c8102e"/>
    <!-- Crown points (3 peaks) -->
    <!-- Left peak -->
    <polygon points="-22,-2 -16,-18 -10,-2" fill="#c8102e"/>
    <!-- Center peak (tallest) -->
    <polygon points="-6,-8 0,-26 6,-8" fill="#c8102e"/>
    <!-- Right peak -->
    <polygon points="10,-2 16,-18 22,-2" fill="#c8102e"/>
    <!-- Crown gems / dots -->
    <circle cx="-16" cy="-10" r="2.5" fill="#ffffff" opacity="0.9"/>
    <circle cx="0" cy="-16" r="2.5" fill="#ffffff" opacity="0.9"/>
    <circle cx="16" cy="-10" r="2.5" fill="#ffffff" opacity="0.9"/>
    <!-- Base bottom line -->
    <rect x="-22" y="18" width="44" height="2" rx="1" fill="#c8102e"/>
  </g>
  <!-- PAUL BASSETT text -->
  <text x="50" y="82" text-anchor="middle" font-family="'Georgia', 'Times New Roman', serif" font-size="8.5" font-weight="700" fill="#1a1a1a" letter-spacing="1.5">PAUL BASSETT</text>
</svg>
